import SwiftUI

enum Skill: String, CaseIterable, Identifiable {
  case attack = "Attack"
  case strength = "Strength"
  case defense = "Defense"
  case agility = "Agility"
  case discipline = "Discipline"

  var id: String { rawValue }

  var trainingMethod: String {
    switch self {
    case .attack:
      return "Push day"
    case .strength:
      return "Pull day"
    case .defense:
      return "Leg day"
    case .agility:
      return "Running"
    case .discipline:
      return "Consistency"
    }
  }

  var xpRule: String {
    switch self {
    case .attack:
      return "10 XP per push-day minute"
    case .strength:
      return "10 XP per pull-day minute"
    case .defense:
      return "10 XP per leg-day minute"
    case .agility:
      return "100 XP per mile"
    case .discipline:
      return "50 XP per completed workout"
    }
  }

  var symbolName: String {
    switch self {
    case .attack:
      return "arrow.up.forward.circle.fill"
    case .strength:
      return "figure.strengthtraining.traditional"
    case .defense:
      return "shield.fill"
    case .agility:
      return "figure.run"
    case .discipline:
      return "calendar.badge.checkmark"
    }
  }

  var color: Color {
    switch self {
    case .attack:
      return .red
    case .strength:
      return .blue
    case .defense:
      return .green
    case .agility:
      return .orange
    case .discipline:
      return .purple
    }
  }
}
